# UX surface inventory with per-persona intensity scores.
# Inventory source: agents/sofia/ux-surface.md (2026-05-12 snapshot).
#
# intensity scale per persona:
#   0 = not used / invisible to this persona
#   1 = incidental (once per onboarding, or rare)
#   2 = common (seen during a typical session)
#   3 = core (mental-model-load-bearing, used multiple times per session)
#
# required_for: list of personas for whom this surface is REQUIRED to
#   complete their journey. Marks "infrastructure" surfaces that can't be
#   cut even if their aggregate V(S) is low (e.g., /login).
#
# admin: surface only visible to team admins
# agent_facing: the AI agent itself uses this surface, not (only) a human
# vocabulary_friction: list of personas whose do-not-introduce vocabulary
#   appears in this surface; flag for reframing, NOT a cut signal
# redundant_with: id of another surface this one duplicates
# deprecated: explicit flag
#
# Intensity values are judgments from inventory + persona journey reasoning,
# not telemetry. Treat as structured prioritization aid, not measurement.

