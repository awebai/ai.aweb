# UX surface inventory with per-persona role_for assignments.
# Inventory source: agents/sofia/ux-surface.md (2026-05-12 snapshot).
#
# role_for taxonomy (see personas.yaml for value-to-weight mapping):
#   essential  — persona cannot function without this surface
#   heavy      — used often, core to the persona's daily workflow
#   useful     — used occasionally, valued when needed
#   irrelevant — not used; not in the way (invisible / hidden)
#   friction   — visible to persona but unused; cognitive load -> HIDE_FOR
#   harmful    — breaks mental model (vocabulary leak / wrong frame) -> REFRAME_FOR
#
# For P3 and P4 (the CLI-running personas), role_for = max over
# {human-developer, agent-the-developer-runs}. Many CLI verbs are
# heavy for the AGENT (mail/chat/task/workspace status) even though
# the human-developer rarely types them.
# For P1 and P2, the human never uses CLI; their AGENTS use MCP tools.
#
# required_for: list of personas for whom this surface is REQUIRED
#   infrastructure (e.g., /login). Combined with role_for=essential,
#   it pins the surface as never-cuttable.
# redundant_with: id of another surface this one duplicates
# deprecated: explicit flag
# admin: surface only visible to team admins
# agent_facing: the AI agent uses this surface (not only the human)
#
# role_for assignments grounded in:
# - Sofia's own usage (P3-agent surfaces — verifiable from
#   agents/sofia/.aw/interaction-log.jsonl)
# - Juan's stated reads (P3-human: aw init essential, aw workspace
#   add-worktree heavy, aw roles friction)
# - Persona-journey reasoning for P1/P2/P4 (hypothesis-shaped per
#   audiences.md; mark uncertain)

